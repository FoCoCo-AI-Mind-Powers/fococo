  # Enhanced UI Components Dependencies
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0

  # Audio Intelligence Dependencies
  flutter_tts: ^4.2.0
  speech_to_text: ^7.1.1
  just_audio: ^0.9.42
  permission_handler: ^11.3.1
  cloud_functions: ^5.1.7

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.0

dependency_overrides:
  http: 1.2.2
  uuid: ^4.0.0

dev_dependencies:
  flutter_lints: ^3.0.0
  lints: ^3.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/fococo logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/Ffococo logo.png"
    background_color: "#0a3669"
    theme_color: "#0a3669"
  windows:
    generate: true
    image_path: "assets/images/fococo logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/fococo logo.png"

# Flutter Native Splash Configuration
flutter_native_splash:
  # This package generates native code to customize Flutter's default white splash screen
  # with background color and splash image.
  # Customize the parameters below, and run the following command in the terminal:
  # fvm flutter packages pub run flutter_native_splash:create
  # To restore Flutter's default white splash screen, run the following command in terminal:
  # fvm flutter packages pub run flutter_native_splash:remove

  # color or background_image is the only required parameter.  Use color to set the background
  # of your splash screen to a solid color.  For background_image, use a png file as a background_image.
  # Set a dark background_image for dark mode support.
  
  # image is the path to the image used as the splash screen image.  If this parameter is
  # not provided, the package will use the image from flutter_launcher_icons.
  image: assets/images/fococo logo.png
  
  # Sets the background color for the splash screen.
  color: "#1A237E"
  
  # image_dark is an image which will be used in dark mode only. If specified, color_dark will be used as a background color
  # for dark mode. If image_dark is not specified but color_dark is specified, color_dark will be used for both normal mode and dark mode.
  # image_dark: assets/images/fococo logo.png
  # color_dark: "#042A5C"
  
  # The branding property allows you to specify an image used as branding in the splash screen.
  # It must be a png file and will be placed at the bottom of the screen, with its width being a maximum of the 80% of the screen width.
  # branding: assets/images/dart.png
  
  # To position the branding image at the bottom of the screen you can also specify the branding_bottom_padding.
  # branding_bottom_padding: 24
  
  # Specify platform specific settings
  android_12:
    # image: assets/images/fococo logo.png
    icon_background_color: "#1A237E"
    
  android_gravity: center
  ios_content_mode: center
  web_image_mode: center
  
  # Platform specific images
  android: true
  ios: true
  web: true
  
  # The position of the splash image can be set with android_gravity, ios_content_mode, and web_image_mode parameters.
  # android_gravity can be one of the following Android Gravity (see https://developer.android.com/reference/android/view/Gravity): bottom, center, 
  # center_horizontal, center_vertical, clip_horizontal, clip_vertical, end, fill, fill_horizontal, fill_vertical, left, right, start, or top.
  # ios_content_mode can be one of the following iOS UIView.ContentMode (see https://developer.apple.com/documentation/uikit/uiview/contentmode): 
  # scaleToFill, scaleAspectFit, scaleAspectFill, center, top, bottom, left, right, topLeft, topRight, bottomLeft, or bottomRight.
  # web_image_mode can be one of the following modes: center, contain, stretch, and cover.

