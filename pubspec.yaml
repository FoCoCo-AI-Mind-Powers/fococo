    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/fonts/
    - assets/images/
    - assets/images/logo/
    - assets/images/logo/Logo.png
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/
    - assets/jsons/mindcoach_session_catalog_v1.json

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo/Logo.png"
  min_sdk_android: 21
  # Adaptive icon configuration for Android (smaller logo with padding)
  adaptive_icon_background: "#000000"  # Black background
  adaptive_icon_foreground: "assets/images/logo/Logo.png"

# Flutter Native Splash Screen Configuration
flutter_native_splash:
  color: "#000000"  # Primary background color (white)
  image: "assets/images/logo/Logo.png"
  color_dark: "#000000"  # Dark mode primary background
  image_dark: "assets/images/logo/Logo.png"
  
  android: true
  android_12:
    color: "#000000"
    image: "assets/images/logo/Logo.png"
    color_dark: "#000000"
    image_dark: "assets/images/logo/Logo.png"
  
  ios: true
  
  web: false
  
  fullscreen: true
